services:
  - type: web
    name: siteguard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT_SCANS
        value: "4"
      - key: RATE_LIMIT_MAX
        value: "10"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: SCAN_CACHE_TTL_MS
        value: "300000"
